<!DOCTYPE html>
<html lang="pt-BR">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow" />
    <title>404 - Página não encontrada | Officina 404</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />

<body>
    <main class="page" aria-label="Página não encontrada">

            <div class="container error-card">

                <p>
                    O caminho procurado não está ativo ou foi movido. Vamos redirecioná-lo para o hub técnico

                </p>
                <div class="hero-cta">
                    <a class="btn btn-primary" href="index.html">Voltar para a home</a>
                    <a class="btn btn-secondary" href="index.html#projetos">Ver projetos</a>
                </div>
            </div>
        </section>
